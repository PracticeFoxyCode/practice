name: Tests
on:
  pull_request:
jobs:
  Unit-Tests:
    runs-on: ubuntu-24.04
    steps:
      - name: check out our code
        uses: actions/checkout@v3
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: install poetry
        run:  curl -sSL https://install.python-poetry.org | python -
      - name: install myself
        run:  poetry install
      - name: unit tests
        run: poetry run python -m pytest -rA -sv tests/
